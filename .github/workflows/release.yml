name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Build and Publish 42 MCP Server
        working-directory: ./
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm install
          npm run build
          # Check if version exists on npm, if not publish
          if npm view $(node -p "require('./package.json').name")@$(node -p "require('./package.json').version") version 2>/dev/null; then
            echo "Version already published, skipping..."
          else
            npm publish --access public
          fi